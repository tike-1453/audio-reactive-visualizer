<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio-Reactive Visualizer</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>
  <body>
    <!-- Mic needs a user click before the browser will allow it. This button
         is that click; we hide it once the mic is running. -->
    <button id="start-btn">🎤 Click to start the mic</button>
    <script type="module" src="/src/main.js"></script>
    <style>
      #start-btn {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 16px 28px;
        font-size: 18px;
        font-family: system-ui, sans-serif;
        color: #fff;
        background: rgba(20, 20, 30, 0.85);
        border: 1px solid #6a5acd;
        border-radius: 999px;
        cursor: pointer;
        z-index: 10;
      }
      #start-btn:hover {
        background: rgba(50, 40, 80, 0.95);
      }
    </style>
  </body>
</html>
